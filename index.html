<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Головченко Дарья (Версия 1)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #2d1b44;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .background-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }
        
        .shape {
            position: absolute;
            opacity: 0.15;
        }
        
        .shape-1 {
            top: -100px;
            right: -50px;
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, #b79aff, #8b6fd8);
            border-radius: 62% 38% 42% 58% / 37% 53% 47% 63%;
        }
        
        .shape-2 {
            bottom: -80px;
            left: -60px;
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #9b87e0, #c7b0ff);
            border-radius: 63% 37% 54% 46% / 41% 38% 62% 59%;
        }
        
        .shape-3 {
            top: 20%;
            left: 10%;
            width: 200px;
            height: 200px;
            background: linear-gradient(225deg, #a78bfa, #d4bcff);
            border-radius: 41% 59% 38% 62% / 52% 43% 57% 48%;
            opacity: 0.1;
        }
        
        .lines {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        
        .line {
            position: absolute;
            background: rgba(183, 148, 244, 0.1);
        }
        
        .line-1 {
            top: 15%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: rotate(5deg);
            background: linear-gradient(90deg, transparent, #b79aff, transparent);
        }
        
        .line-2 {
            bottom: 25%;
            right: 0;
            width: 80%;
            height: 2px;
            transform: rotate(-3deg);
            background: linear-gradient(90deg, transparent, #9b87e0, transparent);
        }
        
        .line-3 {
            top: 60%;
            left: -5%;
            width: 70%;
            height: 2px;
            transform: rotate(45deg);
            background: linear-gradient(90deg, transparent, #c7b0ff, transparent);
        }
        
        .line-4 {
            top: 30%;
            right: 10%;
            width: 150px;
            height: 150px;
            border: 2px solid rgba(183, 148, 244, 0.1);
            border-radius: 50%;
            background: transparent;
        }
        
        .line-5 {
            bottom: 10%;
            left: 20%;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(155, 135, 224, 0.1);
            border-radius: 50%;
            background: transparent;
        }
        
        .dots {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(183, 148, 244, 0.15) 2px, transparent 2px),
                              radial-gradient(circle at 80% 70%, rgba(155, 135, 224, 0.15) 2px, transparent 2px),
                              radial-gradient(circle at 40% 60%, rgba(199, 176, 255, 0.15) 2px, transparent 2px),
                              radial-gradient(circle at 90% 20%, rgba(183, 148, 244, 0.15) 2px, transparent 2px),
                              radial-gradient(circle at 10% 85%, rgba(155, 135, 224, 0.15) 2px, transparent 2px);
            background-size: 150px 150px, 200px 200px, 180px 180px, 220px 220px, 160px 160px;
            background-repeat: repeat;
        }
        
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(183, 148, 244, 0.05) 0px, transparent 1px, transparent 50px),
                repeating-linear-gradient(90deg, rgba(155, 135, 224, 0.05) 0px, transparent 1px, transparent 50px);
            background-size: 50px 50px;
        }
        
        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 45px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        h1 {
            color: #2d1b44;
            font-size: 34px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 4px rgba(170, 130, 240, 0.2);
            position: relative;
            display: inline-block;
        }
        
        h1::after {
            content: '✦';
            position: absolute;
            top: -10px;
            right: -25px;
            font-size: 20px;
            color: #b79aff;
        }
        
        .subtitle {
            color: #6b4e9e;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(183, 148, 244, 0.3);
            position: relative;
        }
        
        .subtitle::before, .subtitle::after {
            content: '✦';
            color: #b79aff;
            margin: 0 10px;
            font-size: 14px;
        }
        
        .info-item {
            background: rgba(245, 238, 255, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(170, 130, 240, 0.2);
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        .info-item:hover {
            background: white;
            box-shadow: 0 10px 30px rgba(170, 130, 240, 0.4);
        }
        
        .info-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(145deg, #b79aff, #8b6fd8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            margin: 0 auto 15px;
            box-shadow: 0 5px 15px rgba(139, 111, 216, 0.4);
        }
        
        .info-text .label {
            font-size: 13px;
            color: #9b87b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .info-text .value {
            color: #2d1b44;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.4;
        }
        
        .subscribe-btn {
            background: #708090; 
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            margin-top: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(107, 78, 158, 0.3);
        }
        
        .subscribe-btn:hover {
            background: #8b6fd8;  
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(107, 78, 158, 0.4);
        }
        
        .decor-stars {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0 5px;
        }
        
        .decor-stars span {
            color: #b79aff;
            font-size: 18px;
        }

        .social-login {
            margin: 25px 0 10px;
            padding: 20px;
            background: rgba(245, 238, 255, 0.5);
            border-radius: 30px;
            border: 1px dashed rgba(183, 148, 244, 0.5);
        }
        
        .social-login-title {
            color: #6b4e9e;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .social-btn {
            min-width: 80px;
            padding: 10px 15px;
            border-radius: 30px;
            border: none;
            background: white;
            color: #2d1b44;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(107, 78, 158, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(183, 148, 244, 0.3);
        }
        
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(107, 78, 158, 0.4);
            color: white;
        }
        
        .social-btn.vk:hover {
            background: #4a76a8;
            border-color: #4a76a8;
        }
        
        .social-btn.telegram:hover {
            background: #0088cc;
            border-color: #0088cc;
        }
        
        .social-btn.google:hover {
            background: #db4437;
            border-color: #db4437;
        }
        
        .social-btn.yandex:hover {
            background: #ff3333;
            border-color: #ff3333;
        }
        
        .social-btn.github:hover {
            background: #333;
            border-color: #333;
        }
        
        .social-icon {
            font-size: 18px;
            font-weight: 600;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #9b87b8;
            font-size: 14px;
            margin: 20px 0 10px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(183, 148, 244, 0.3);
        }
        
        .divider::before {
            margin-right: 10px;
        }
        
        .divider::after {
            margin-left: 10px;
        }
        
        @media (max-width: 500px) {
            .card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            h1::after {
                right: -20px;
                font-size: 16px;
            }
            
            .subscribe-btn {
                padding: 10px 25px;
                font-size: 14px;
            }
            
            .social-btn {
                min-width: 70px;
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="background-pattern">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        
        <div class="lines">
            <div class="line line-1"></div>
            <div class="line line-2"></div>
            <div class="line line-3"></div>
            <div class="line line-4"></div>
            <div class="line line-5"></div>
        </div>
        
        <div class="dots"></div>
        
        <div class="grid"></div>
    </div>
    
    <div class="card">
        <h1>Головченко Дарья</h1>
        <div class="subtitle">будущий IT-специалист</div>
        
        <div class="info-item">
            <div class="info-text">
                <div class="label">Учебное заведение</div>
                <div class="value">Алтайский государственный институт<br>(филиал) АлтГУ</div>
            </div>
        </div>
        
        <div class="info-item">
            <div class="info-text">
                <div class="label">Специальность</div>
                <div class="value">Информационные системы и программирование<br>IT-специалист</div>
            </div>
        </div>

        <div class="social-login">
            <div class="social-login-title">Войти с помощью</div>
            <div class="social-buttons">
                <button class="social-btn vk" title="ВКонтакте">
                    <span>ВКонтакте</span>
                </button>
                <button class="social-btn telegram" title="Telegram">
                    <span>Telegram</span>
                </button>
                <button class="social-btn google" title="Google">
                    <span>Google</span>
                </button>
                <button class="social-btn yandex" title="Яндекс">
                    <span>Яндекс</span>
                </button>
                <button class="social-btn github" title="GitHub">
                    <span>GitHub</span>
                </button>
            </div>
        </div>
        
        <div class="divider">или</div>
        
        <div class="decor-stars">
            <span>✧</span>
            <span>✦</span>
            <span>✧</span>
        </div>
        
        <button class="subscribe-btn">✧ Подписаться на новости ✧</button>
    </div>

    <script>
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const socialName = this.querySelector('span:last-child').textContent;
                alert(`Демонстрация входа через ${socialName}`);
            });
        });
    </script>
</body>
</html>
